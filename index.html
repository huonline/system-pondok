<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Pondok — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
    
</head> 
<body>

  <div class="bg-grid"></div>
  <canvas id="cv"></canvas>

  <div class="center-wrap" id="content">
    <p class="label-top">SISTEM INFORMASI PONDOK</p>
    <h1 class="title">Selamat Datang, Admin</h1>
    <p class="label-sub">DASHBOARD STATISTIK PONDOK PESANTREN</p>

    <div class="form-box">
      <div class="input-group">
        <label class="input-label">EMAIL</label>
        <input type="email" id="inputEmail" class="input-field" placeholder="admin@pondok.com" />
      </div>
      <div class="input-group">
        <label class="input-label">PASSWORD</label>
        <input type="password" id="inputPassword" class="input-field" placeholder="••••••••" />
      </div>
      <p class="error-msg" id="errorMsg"></p>
      <button class="btn-masuk" id="btnMasuk">&#9654; MASUK</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
